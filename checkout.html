<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acquisition Protocol | ECCENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#d4af37',
                        burgundy: '#1a0505',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="vault.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-soft: #c5a028; --deep-burgundy: #1a0505; --panel-burgundy: #250808; --glass: rgba(255, 255, 255, 0.03); --cream: #fdf5e6; }
        body { background-color: var(--deep-burgundy); color: var(--cream); font-family: 'Montserrat', sans-serif; }
        .luxury-font { font-family: 'Cormorant Garamond', serif; }
        
        .shopify-input { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(212, 175, 55, 0.1); 
            border-radius: 2px; 
            padding: 14px; 
            width: 100%; 
            font-size: 13px; 
            color: var(--cream);
            outline: none; 
            transition: 0.3s; 
        }
        .shopify-input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .shopify-input::placeholder { color: rgba(253, 245, 230, 0.2); }
 
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-style: italic; margin-bottom: 20px; margin-top: 40px; color: var(--gold); }
        
        .summary-side { background: var(--panel-burgundy); backdrop-filter: blur(20px); border-left: 1px solid rgba(212, 175, 55, 0.05); min-height: 100vh; }
        
        .btn-premium { 
            background: var(--gold); 
            border: 1px solid var(--gold); 
            color: var(--deep-burgundy); 
            padding: 20px; 
            font-size: 12px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            width: 100%; 
            transition: 0.5s; 
            cursor: pointer;
            font-weight: 600;
        }
        .btn-premium:hover { background: transparent; color: var(--gold); }
        
        .discount-btn { 
            background: transparent; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 12px 24px; 
            border-radius: 2px; 
            font-size: 10px; 
            letter-spacing: 2px; 
            color: var(--gold); 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        .discount-btn:hover { background: var(--gold); color: var(--deep-burgundy); }
        
        select.shopify-input { appearance: none; background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
 
        .payment-card {
            padding: 32px;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.01);
        }
        .payment-card:hover { border-color: rgba(212, 175, 55, 0.4); }
        .payment-card.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row">
        
        <!-- LEFT SIDE: FORMS -->
        <div class="w-full md:w-[60%] p-8 md:p-20">
            <h1 class="luxury-font text-4xl tracking-[0.5em] mb-16 cursor-pointer" onclick="window.location.href='index.html'">ECCENCE</h1>
            
            <!-- CONTACT -->
            <div class="reveal">
                <div class="flex justify-between items-baseline mb-6">
                    <h2 class="section-title">Contact</h2>
                    <a href="#" class="text-[10px] tracking-widest text-gold uppercase opacity-50 hover:opacity-100">Vault Login</a>
                </div>
                <input type="email" id="email" placeholder="Identity (Email)" class="shopify-input mb-4">
                <label class="flex items-center gap-4 text-[10px] tracking-widest uppercase opacity-40 cursor-pointer hover:opacity-70">
                    <input type="checkbox" checked class="w-3 h-3 border-white/20 bg-transparent">
                    Subscribe to The Scent Journal
                </label>
            </div>

            <!-- DELIVERY -->
            <div class="mt-16 reveal">
                <h2 class="section-title">Delivery Protocol</h2>
                <div class="space-y-4">
                    <select id="country" class="shopify-input">
                        <option value="Egypt">Egypt</option>
                    </select>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="first-name" placeholder="First Name" class="shopify-input">
                        <input type="text" id="last-name" placeholder="Last Name" class="shopify-input">
                    </div>

                    <input type="text" id="address" placeholder="Shipping Coordinates (Address)" class="shopify-input">
                    <input type="text" id="apartment" placeholder="Apartment, suite, etc." class="shopify-input">

                    <div class="grid grid-cols-3 gap-4">
                        <input type="text" id="city" placeholder="City" class="shopify-input">
                        <select id="governorate" class="shopify-input">
                            <option value="Cairo">Cairo</option>
                            <option value="Giza">Giza</option>
                            <option value="Alexandria">Alexandria</option>
                        </select>
                        <input type="text" id="postal-code" placeholder="Zip (Optional)" class="shopify-input">
                    </div>

                    <div class="relative">
                        <input type="tel" id="phone" placeholder="Contact Channel (Phone)" class="shopify-input">
                        <i data-lucide="phone" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 opacity-20"></i>
                    </div>
                </div>
            </div>

            <!-- PAYMENT -->
            <div class="mt-20 pt-10 border-t border-white/5 reveal">
                <h2 class="section-title">Payment Channel</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                    <div class="payment-card" id="card-vodafone" onclick="selectPayment('vodafone')">
                        <h4 class="luxury-font text-2xl italic mb-2">Vodafone Wallet</h4>
                        <p class="text-[10px] tracking-widest text-gold opacity-70">Transfer to: 01004268823</p>
                    </div>
                    <div class="payment-card" id="card-telda" onclick="selectPayment('telda')">
                        <h4 class="luxury-font text-2xl italic mb-2">Telda</h4>
                        <p class="text-[10px] tracking-widest text-gold opacity-70">Username: @soly5656</p>
                    </div>
                </div>

                <div id="payment-instructions" class="hidden mb-8 p-6 border border-gold/20 bg-gold/5 text-[10px] tracking-widest uppercase leading-loose opacity-70"></div>

                <button id="finalize-btn" onclick="finalizeOrder()" class="btn-premium">Finalize Acquisition</button>
                
                <div class="flex justify-center gap-8 mt-12 opacity-20">
                    <div class="flex items-center gap-2 text-[8px] tracking-[0.3em] uppercase"><i data-lucide="shield-check" class="w-3 h-3"></i> SSL SECURE</div>
                    <div class="flex items-center gap-2 text-[8px] tracking-[0.3em] uppercase"><i data-lucide="lock" class="w-3 h-3"></i> AES-256</div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: SUMMARY -->
        <div class="w-full md:w-[40%] summary-side p-8 md:p-20">
            <h3 class="luxury-font text-4xl italic mb-12">Archive Summary</h3>
            <div id="summary-items" class="space-y-10 mb-12">
                <!-- Items populated by JS -->
            </div>

            <!-- DISCOUNT -->
            <div class="flex gap-4 mb-12">
                <input type="text" placeholder="Promotion Protocol" class="shopify-input">
                <button class="discount-btn">Apply</button>
            </div>

            <!-- TOTALS -->
            <div class="space-y-4 text-[10px] tracking-[0.2em] uppercase border-t border-white/10 pt-10">
                <div class="flex justify-between opacity-40">
                    <span>Subtotal</span>
                    <span id="subtotal">0 EGP</span>
                </div>
                <div class="flex justify-between items-center opacity-40">
                    <span>Shipping Protocol</span>
                    <span>Complimentary</span>
                </div>
                <div class="flex justify-between items-baseline pt-6">
                    <span class="luxury-font text-3xl italic normal-case tracking-normal text-gold">Total Value</span>
                    <div class="text-right">
                        <span id="total" class="text-4xl text-gold italic">0 EGP</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let selectedMethod = null;

        function selectPayment(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + method).classList.add('active');
            const instructions = document.getElementById('payment-instructions');
            instructions.classList.remove('hidden');
            if (method === 'vodafone') {
                instructions.innerText = 'Send your total to Vodafone Wallet: 01004268823 — then click Finalize Acquisition below.';
            } else {
                instructions.innerText = 'Send your total to Telda: @soly5656 — then click Finalize Acquisition below.';
            }
        }

        function renderSummary() {
            const cart = getCart();
            const container = document.getElementById('summary-items');
            container.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center gap-8">
                    <div class="relative">
                        <div class="w-20 h-20 bg-white/5 border border-white/10 rounded-sm overflow-hidden flex items-center justify-center p-3">
                            <img src="${item.file}" class="max-h-full max-w-full object-contain drop-shadow-xl">
                        </div>
                        <span class="absolute -top-3 -right-3 bg-gold text-black text-[9px] w-6 h-6 rounded-full flex items-center justify-center font-bold">1</span>
                    </div>
                    <div class="flex-grow">
                        <h4 class="luxury-font text-2xl italic">${item.name}</h4>
                        <p class="text-[8px] tracking-widest uppercase opacity-30 mt-1">High-Concentration Extract</p>
                    </div>
                    <span class="text-gold italic text-lg">${item.price} EGP</span>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('subtotal').innerText = `${subtotal} EGP`;
            document.getElementById('total').innerText = `${subtotal} EGP`;
        }

        async function finalizeOrder() {
            const btn = document.getElementById('finalize-btn');
            const originalText = btn.innerText;
            btn.innerText = "Authenticating Protocol...";
            btn.disabled = true;

            const cart = getCart();
            const orderData = {
                email: document.getElementById('email').value,
                firstName: document.getElementById('first-name').value,
                lastName: document.getElementById('last-name').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                items: cart.map(i => i.name).join(', '),
                total: document.getElementById('total').innerText
            };

            if(!orderData.email || !orderData.firstName || !orderData.address) {
                alert("Protocol Error: Required coordinates missing.");
                btn.innerText = originalText;
                btn.disabled = false;
                return;
            }

            if(!selectedMethod) {
                alert("Please select a payment channel: Vodafone Wallet or Telda.");
                btn.innerText = originalText;
                btn.disabled = false;
                return;
            }

            orderData.paymentMethod = selectedMethod;

            try {
                const response = await fetch("https://formspree.io/f/meevygna", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    alert("Your order will be confirmed soon. Returning to Boutique.");
                    clearCart();
                    window.location.href = 'index.html';
                } else {
                    alert("Submission error. Connect with Concierge.");
                }
            } catch (err) {
                alert("System error. Check connection.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        renderSummary();
        lucide.createIcons();
    </script>
</body>
</html>
